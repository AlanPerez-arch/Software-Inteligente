<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        {% block title %}{% endblock %}
    </title>

    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- FONT AWESOME -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar-premium">

    <div class="container navbar-flex">

        <a href="/" class="logo-area">

            <div class="logo-icon">
                <i class="fa-solid fa-seedling"></i>
            </div>

            <h2>
                Bloom<span>AI</span>
            </h2>

        </a>

        <div class="nav-links">

            <a href="/">
                <i class="fa-solid fa-house"></i>
                Inicio
            </a>

            <a href="/formulario">
                <i class="fa-solid fa-wand-magic-sparkles"></i>
                Crear proyecto
            </a>

            <a href="/#historial">
                <i class="fa-solid fa-clock-rotate-left"></i>
                Historial
            </a>

            <a href="/logout" class="logout-link">
                <i class="fa-solid fa-right-from-bracket"></i>
                Salir
            </a>

        </div>

        <div class="navbar-actions">

            <div class="ai-status">
                <span class="status-dot"></span>
                GROD IA
            </div>

            



            <!-- SWITCH -->
            <div class="theme-switch">

                <input type="checkbox"
                       id="theme-toggle">

                <label for="theme-toggle"
                       class="toggle-label">

                    <i class="fa-solid fa-sun"></i>

                    <i class="fa-solid fa-moon"></i>

                    <span class="toggle-ball"></span>

                </label>

            </div>

            <!-- ACCESSIBILITY SWITCH -->

<div class="voice-switch">

    <input type="checkbox"
           id="voice-toggle">

    <label for="voice-toggle"
           class="voice-label">

        <i class="fa-solid fa-volume-high"></i>

    </label>

</div>

        </div>

    </div>

</nav>

    <!-- CONTENIDO -->
    <main>

        {% block body %}
        {% endblock %}

    </main>

    <!-- BOOTSTRAP JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
    <script src="{{ url_for('static',filename='js/accessibility.js') }}"></script>
    <script>
    const themeButton = document.getElementById("themeButton");
    const body = document.body;

    if (themeButton) {
        if (localStorage.getItem("bloomTheme") === "dark") {
            body.classList.add("dark-mode");
            themeButton.innerHTML = '<i class="fa-solid fa-sun"></i>';
        }

        themeButton.addEventListener("click", () => {
            body.classList.toggle("dark-mode");

            if (body.classList.contains("dark-mode")) {
                localStorage.setItem("bloomTheme", "dark");
                themeButton.innerHTML = '<i class="fa-solid fa-sun"></i>';
            } else {
                localStorage.setItem("bloomTheme", "light");
                themeButton.innerHTML = '<i class="fa-solid fa-moon"></i>';
            }
        });
    }
</script>
</body>

</html>
